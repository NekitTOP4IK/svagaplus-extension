<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Social Rating — Auth</title>
  <style>
    body {
      background: #0e0e10;
      color: #efeff1;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    p { font-size: 14px; color: #adadb8; }
  </style>
</head>
<body>
  <p id="msg">Авторизация…</p>
  <script>
    (function () {
      var msg = document.getElementById('msg');

      // Tokens may be in the fragment (#) or query string (?), depending on backend
      var hash = window.location.hash.slice(1);
      var search = window.location.search.slice(1);
      var params = new URLSearchParams(hash || search);

      var access_token = params.get('access_token');
      var refresh_token = params.get('refresh_token');
      var login = params.get('login');
      var avatar_url = params.get('avatar_url');
      var expires_in = params.get('expires_in');
      var extension_state = params.get('extension_state');

      if (!access_token || !refresh_token) {
        msg.textContent = 'Ошибка авторизации. Попробуйте снова.';
        return;
      }

      var payload = {
        type: 'OAUTH_CALLBACK',
        access_token: access_token,
        refresh_token: refresh_token,
        login: login,
        avatar_url: avatar_url,
        expires_in: expires_in,
        extension_state: extension_state,
      };

      function send() {
        if (typeof browser !== 'undefined' && browser.runtime && browser.runtime.sendMessage) {
          browser.runtime.sendMessage(payload).catch(function () {});
        } else if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
          chrome.runtime.sendMessage(payload, function () {});
        }
      }

      send();
      msg.textContent = 'Авторизация завершена. Можно закрыть эту вкладку.';
    })();
  </script>
</body>
</html>
