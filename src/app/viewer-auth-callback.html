<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Свага+</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #171721;
        color: #ededf3;
      }
      html, body {
        margin: 0;
        min-height: 100%;
        background: #171721;
      }
      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .shell {
        width: min(320px, calc(100vw - 32px));
        border: 1px solid #343442;
        background: #1e1e2a;
        padding: 20px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #c3c3cc;
        font-size: 14px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1 id="title">Свага+</h1>
      <p id="status">Подключение аккаунта...</p>
    </main>
    <script src="viewer-auth-callback.js"></script>
  </body>
</html>
