<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Свага+</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <img class="brand-mark" src="../../icons/icon64.png" alt="" />
        <div class="brand-copy">
          <h1>Свага+</h1>
          <p>Свагометр и Соц. рейтинг</p>
        </div>
      </header>

      <section class="panel" aria-labelledby="accountTitle">
        <div class="panel-head">
          <h2 id="accountTitle">Аккаунт</h2>
          <span id="connectionState" class="pill">Проверка...</span>
        </div>

        <div id="connectedAccount" class="account" hidden>
          <img id="accountAvatar" class="avatar" alt="" />
          <div class="account-copy">
            <div id="accountLogin" class="account-login"></div>
            <div id="accountTelegramMeta" class="account-meta">
              <span id="accountTelegramWarning" class="account-meta-icon" hidden aria-hidden="true">
                <svg viewBox="0 0 20 20" focusable="false">
                  <path d="M10 2.5 18 17.5H2L10 2.5Zm0 4.2a.9.9 0 0 0-.9.9v4.5a.9.9 0 1 0 1.8 0V7.6a.9.9 0 0 0-.9-.9Zm0 8.2a1.1 1.1 0 1 0 0-2.2 1.1 1.1 0 0 0 0 2.2Z" />
                </svg>
              </span>
              <span id="accountTelegram"></span>
            </div>
          </div>
        </div>

        <div id="disconnectedAccount" class="account account--empty" hidden>
          <div class="account-copy">
            <div class="account-login">Аккаунт не подключен</div>
            <div class="account-meta">Подключите Svaga+ viewer account.</div>
          </div>
        </div>

        <div class="actions">
          <button id="primaryAction" class="button button--primary" type="button">Подключить аккаунт</button>
          <button id="secondaryAction" class="button button--text" type="button" hidden>Выйти</button>
        </div>
      </section>

      <section class="panel" aria-labelledby="settingsTitle">
        <div class="panel-head">
          <h2 id="settingsTitle">Настройки</h2>
        </div>

        <label class="setting setting--toggle" for="socialRatingToggle">
          <div>
            <div class="setting-label">Соц. рейтинг</div>
            <div class="setting-note">Для применения изменений обновите страницу.</div>
          </div>
          <input id="socialRatingToggle" type="checkbox" />
        </label>
      </section>

      <footer class="footer" hidden>
        <button id="openSettings" class="button button--secondary" type="button">Открыть настройки</button>
      </footer>

      <section id="popupErrorBanner" class="toast" hidden aria-live="polite">
        <div class="toast-copy">
          <div id="popupErrorTitle" class="toast-title"></div>
          <div id="popupErrorDetail" class="toast-detail"></div>
        </div>
        <div class="toast-icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" focusable="false">
            <path d="M10 2.5 18 17.5H2L10 2.5Zm0 4.2a.9.9 0 0 0-.9.9v4.5a.9.9 0 1 0 1.8 0V7.6a.9.9 0 0 0-.9-.9Zm0 8.2a1.1 1.1 0 1 0 0-2.2 1.1 1.1 0 0 0 0 2.2Z" />
          </svg>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
